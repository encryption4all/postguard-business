services:
  postguard-business:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: pgb-app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.svelte-kit
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://devuser:devpassword@postgres:5432/postguard_business
      - YIVI_SERVER_URL=http://irma-server:8088
      - YIVI_DEMO_ATTRIBUTES=true
      - ORIGIN=http://localhost:8080
      - FF_PRICING_PAGE=true
      - FF_REGISTRATION=true
      - FF_PORTAL_API_KEYS=true
      - FF_PORTAL_ORG_INFO=true
      - FF_PORTAL_EMAIL_LOG=true
      - FF_PORTAL_DNS=true
      - FF_ADMIN_PANEL=true
      - FF_ADMIN_IMPERSONATION=true
    networks:
      - pgb-network
    depends_on:
      db-setup:
        condition: service_completed_successfully

  # Pushes the Drizzle schema and seeds the database on first run
  db-setup:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: pgb-db-setup
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgres://devuser:devpassword@postgres:5432/postguard_business
    entrypoint: ["sh", "-c", "npx drizzle-kit push --force && npx tsx scripts/seed.ts"]
    networks:
      - pgb-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: pgb-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d postguard_business"]
      interval: 1m30s
      timeout: 5s
      retries: 3
      start_interval: 1s
      start_period: 10s
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: postguard_business
    volumes:
      - pgb-postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - pgb-network

  # Generates the IRMA JWT signing key if it doesn't exist yet
  irma-keygen:
    image: alpine:latest
    container_name: pgb-irma-keygen
    entrypoint: ["/bin/sh", "-c", "if [ ! -f /keys/jwt_privkey.pem ]; then apk add --no-cache openssl && openssl genrsa -out /keys/jwt_privkey.pem 2048 && chmod 644 /keys/jwt_privkey.pem; fi"]
    volumes:
      - irma-keys:/keys

  # IRMA/Yivi server (unauthenticated, for development only)
  irma-server:
    image: ghcr.io/privacybydesign/irma:latest
    container_name: pgb-irma-server
    command: server --no-auth -v --url http://localhost:8088 --jwt-privkey-file /keys/jwt_privkey.pem
    ports:
      - "8088:8088"
    volumes:
      - irma-keys:/keys:ro
    depends_on:
      irma-keygen:
        condition: service_completed_successfully
    networks:
      - pgb-network

  irma-healthcheck:
    image: alpine:latest
    container_name: pgb-irma-healthcheck
    entrypoint: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://irma-server:8088/health"]
      interval: 1m30s
      timeout: 5s
      retries: 3
      start_interval: 1s
      start_period: 10s
    depends_on:
      - irma-server
    networks:
      - pgb-network

  mailcrab:
    image: marlonb/mailcrab:latest
    container_name: pgb-mailcrab
    ports:
      - "1080:1080"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - pgb-network

  adminer:
    image: adminer
    container_name: pgb-adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    networks:
      - pgb-network

  nginx:
    image: nginx:alpine
    container_name: pgb-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pgb-network
    depends_on:
      - postguard-business
      - irma-server

networks:
  pgb-network:
    driver: bridge

volumes:
  pgb-postgres-data:
  irma-keys:
